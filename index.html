<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>С 8 Марта!</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>💐 С 8 Марта! 💐</h1>
    <p>Спасибо за заботу, любовь и поддержку</p>
</header>

<section class="gallery">
    <img src="Flowers.jpg">

</section>

<section class="cards">
    <div class="card">
        <h3>Мама</h3>
        <p>Ты всегда рядом ❤️</p>
    </div>

    <div class="card">
        <h3>Сестра</h3>
        <p>Ты моя лучшая Сестра</p>
   </div>
       <div class="card">
        <h3>Сестра</h3>
        <p>Ты мой лучшая Сестра</p>
   </div>
</section>

<button class="surprise-btn">Открыть сюрприз</button>

<div class="surprise">
    🌷 Ты самая лучшая! 🌷
</div>
<script>
    const btn = document.querySelector('.surprise-btn');
    const surprise = document.querySelector('.surprise');

    btn.addEventListener('click', () => {
        surprise.classList.toggle('show');
        if (surprise.classList.contains('show')) {
            surprise.style.display = 'block';
        } else {
            surprise.style.display = 'none';
        }
    });
</script>
</body>
</html>
